<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Request Aid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a2e0bf0b8a.js" crossorigin="anonymous"></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #74ABE2, #5563DE, #E15FED);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            padding: 30px 40px;
            width: 400px;
            color: white;
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        h2 {
            font-weight: 600;
            text-align: center;
            margin-bottom: 25px;
        }

        label {
            font-weight: 500;
            margin-top: 10px;
        }

        input[type="text"], textarea {
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 10px;
            margin-top: 5px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.85);
            color: #333;
        }

        textarea {
            resize: vertical;
        }

        button {
            width: 100%;
            margin-top: 20px;
            border: none;
            background: linear-gradient(45deg, #28a745, #34d058);
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s ease;
        }

        button:hover {
            transform: scale(1.03);
            background: linear-gradient(45deg, #218838, #2eb85c);
        }

        .flash-messages li {
            list-style: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            text-align: center;
        }

        .flash-messages .success {
            background-color: rgba(212, 237, 218, 0.9);
            color: #155724;
        }

        .flash-messages .danger {
            background-color: rgba(248, 215, 218, 0.9);
            color: #721c24;
        }

        a.back {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #fff;
            font-weight: 500;
        }

        a.back:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2><i class="fas fa-hands-helping"></i> Request Aid</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-messages">
              {% for category, message in messages %}
                <li class="{{ category }}">{{ message }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <label>Full Name:</label>
            <input type="text" name="name" placeholder="Enter your full name" required>

            <label>Contact Number:</label>
            <input type="text" name="contact" placeholder="Enter your contact number" required>

            <label>Family/ID (optional):</label>
            <input type="text" name="family_id" placeholder="Enter family ID">

            <label>Type of Aid Needed:</label>
            <input type="text" name="aid_type" placeholder="Food, Water, Medicine..." required>

            <label>Description / Details (optional):</label>
            <textarea name="description" placeholder="Any additional details..."></textarea>

            <label>Latitude (optional):</label>
            <input type="text" name="lat" placeholder="Enter latitude">

            <label>Longitude (optional):</label>
            <input type="text" name="lon" placeholder="Enter longitude">

            <button type="submit">Submit Request</button>
        </form>

       <a href="{{ url_for('home') }}" class="back">⬅ Back to Home</a>

    </div>
</body>
</html>
