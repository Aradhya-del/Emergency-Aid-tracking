<!doctype html>
<html>
<head>
  <title>Submit Aid Distribution</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Maps API will be loaded at the end of the file -->
  <style>
    #map {
      height: 400px;
      width: 100%;
      margin-bottom: 20px;
      border-radius: 8px;
    }
    #locationSearch {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
    }
    .pac-container {
      z-index: 1051 !important;
    }
  </style>
</head>
<body class="container py-4">
  <h2>Submit Aid Distribution</h2>

  <!-- Map and location search OUTSIDE the form for better autocomplete -->
  <div class="mb-3">
    <label>Search Location</label>
    <input id="locationSearch" type="text" class="form-control" placeholder="Search for address, landmark, or shop">
      <div id="map"></div>
      <div class="row mt-2">
        <div class="col">
          <button type="button" class="btn btn-secondary btn-sm" onclick="centerMapOnBrowserLocation()">� Center map on my location</button>
          <button type="button" class="btn btn-info btn-sm ms-2" onclick="detectDonorLocation()">📍 Detect donor location</button>
        </div>
        <div class="col text-end">
          <small class="text-muted">Search or click on the map to set beneficiary location; use the donor button to record donor location</small>
        </div>
      </div>
  </div>

  <form method="post" enctype="multipart/form-data">
    <div class="mb-3">
      <label>Beneficiary Name</label>
      <input name="beneficiary_name" required class="form-control">
    </div>
    <div class="mb-3">
      <label>Beneficiary ID</label>
      <input name="beneficiary_id" class="form-control">
    </div>
    <div class="mb-3">
      <label>Item / Amount</label>
      <input name="item" class="form-control" placeholder="e.g., Rice 5 kg or ₹200">
    </div>
    <div class="mb-3">
      <label>Photo (evidence)</label>
      <input type="file" name="photo" class="form-control">
    </div>

    <!-- Hidden inputs for coordinates -->
    <input type="hidden" id="lat" name="lat">
    <input type="hidden" id="lon" name="lon">
    <input type="hidden" id="donor_lat" name="donor_lat">
    <input type="hidden" id="donor_lon" name="donor_lon">

    <div class="form-check my-2">
      <input type="checkbox" class="form-check-input" id="override" name="override" value="1">
      <label class="form-check-label" for="override">Override duplicate warning</label>
    </div>
    <button class="btn btn-success mt-2" type="submit">Submit</button>
    <a href="{{ url_for('home') }}" class="btn btn-link">Home</a>
  </form>

  <script>
    // Prevent form submission on Enter in locationSearch
    document.addEventListener('DOMContentLoaded', function() {
      var locInput = document.getElementById('locationSearch');
      if (locInput) {
        locInput.addEventListener('keydown', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
          }
        });
      }
    });
    let map;
    let beneficiaryMarker;
    let donorMarker;
    let autocomplete;

    // Initialize Google Maps
    function initMap() {
      const defaultCenter = { lat: 12.9716, lng: 77.5946 };

      map = new google.maps.Map(document.getElementById('map'), {
        center: defaultCenter,
        zoom: 13,
        mapTypeControl: true,
        mapTypeControlOptions: {
          style: google.maps.MapTypeControlStyle.HORIZONTAL_BAR,
          position: google.maps.ControlPosition.TOP_RIGHT,
        },
        fullscreenControl: true,
        streetViewControl: true,
        zoomControl: true,
      });

      // Beneficiary marker (red)
      beneficiaryMarker = new google.maps.Marker({
        map: map,
        draggable: true,
        title: 'Beneficiary location',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 7,
          fillColor: '#d9534f',
          fillOpacity: 1,
          strokeWeight: 1,
          strokeColor: '#fff'
        }
      });

      // Donor marker (blue)
      donorMarker = new google.maps.Marker({
        map: map,
        draggable: true,
        title: 'Donor location',
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 7,
          fillColor: '#0275d8',
          fillOpacity: 1,
          strokeWeight: 1,
          strokeColor: '#fff'
        }
      });

      // Initialize the Places Autocomplete
      autocomplete = new google.maps.places.Autocomplete(
        document.getElementById('locationSearch'),
        {
          componentRestrictions: { country: 'in' },
          fields: ['geometry', 'name', 'formatted_address'],
        }
      );

      autocomplete.bindTo('bounds', map);

      // When a place is selected from autocomplete, set beneficiary marker
      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (!place.geometry) {
          alert('No details available for this place');
          return;
        }
        map.setCenter(place.geometry.location);
        map.setZoom(17);
        beneficiaryMarker.setPosition(place.geometry.location);
        updateBeneficiaryCoordinates(place.geometry.location);
      });

      // Map click sets beneficiary location only
      map.addListener('click', (e) => {
        beneficiaryMarker.setPosition(e.latLng);
        updateBeneficiaryCoordinates(e.latLng);
      });

      // Drag end handlers
      beneficiaryMarker.addListener('dragend', () => {
        updateBeneficiaryCoordinates(beneficiaryMarker.getPosition());
      });
      donorMarker.addListener('dragend', () => {
        updateDonorCoordinates(donorMarker.getPosition());
      });

      // Center map on browser location (does not change donor/beneficiary values)
      centerMapOnBrowserLocation();
    }

    function updateBeneficiaryCoordinates(location) {
      document.getElementById('lat').value = location.lat().toFixed(6);
      document.getElementById('lon').value = location.lng().toFixed(6);
    }

    function updateDonorCoordinates(location) {
      document.getElementById('donor_lat').value = location.lat().toFixed(6);
      document.getElementById('donor_lon').value = location.lng().toFixed(6);
    }

    // Center the map on the browser's approximate location (no form changes)
    function centerMapOnBrowserLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
            map.setCenter(pos);
            map.setZoom(13);
          },
          () => {
            // ignore errors here
          },
          { enableHighAccuracy: true }
        );
      }
    }

    // Detect donor location and set donor marker + hidden inputs
    function detectDonorLocation() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const latLng = new google.maps.LatLng(lat, lng);
            donorMarker.setPosition(latLng);
            map.panTo(latLng);
            map.setZoom(16);
            updateDonorCoordinates(latLng);
          },
          (err) => {
            alert('⚠️ Could not detect donor location: ' + err.message);
          },
          { enableHighAccuracy: true }
        );
      } else {
        alert('⚠️ Geolocation not supported by this browser.');
      }
    }

    // Initialize map when the page loads
    window.initMap = initMap;
  </script>
  <!-- Load Google Maps with your API key -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD4uPQ4NDwfzSePP1wcqPbD9qsX4rcJ8vQ&libraries=places&callback=initMap">
  </script>
</body>
</html>
